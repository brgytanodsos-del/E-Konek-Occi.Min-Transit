<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>E-Konek Occi.Mindo Transit</title>
    <script>
      (function() {
        // Manifest
        const manifest = {
          name: "E-Konek Occi.Mindo Transit",
          short_name: "E-Konek Transit",
          start_url: ".",
          display: "standalone",
          theme_color: "#003580",
          background_color: "#F0F4F8"
        };
        const stringManifest = JSON.stringify(manifest);
        const blob = new Blob([stringManifest], {type: 'application/json'});
        const manifestURL = URL.createObjectURL(blob);
        document.querySelector('head').insertAdjacentHTML('beforeend', `<link rel="manifest" href="${manifestURL}">`);
        
        // Service Worker
        const swCode = `
          const CACHE_NAME = 'mindorotransit-v1';
          self.addEventListener('install', (e) => e.waitUntil(caches.open(CACHE_NAME)));
          self.addEventListener('fetch', (e) => e.respondWith(caches.match(e.request).then(r => r || fetch(e.request))));
        `;
        const swBlob = new Blob([swCode], {type: 'application/javascript'});
        const swURL = URL.createObjectURL(swBlob);
        navigator.serviceWorker.register(swURL).catch(console.error);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
